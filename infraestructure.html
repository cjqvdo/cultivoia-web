<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cultivo IA - Infrastructure Settings</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-color: #F0F2F5;
            --text-main: #1B2B41;
            --text-sec: #6B7280;
            --shadow-hollow-dark: rgba(163, 177, 198, 0.6);
            --shadow-hollow-light: rgba(255, 255, 255, 0.9);
            --shadow-block-dark: rgba(163, 177, 198, 0.3);
            --shadow-block-light: rgba(255, 255, 255, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        body {
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 10px 0 120px 0; /* Ajuste para el viewport del app.js */
        }

        .container { width: 100%; max-width: 420px; }
        header { margin-bottom: 30px; text-align: center; }
        h1 { font-size: 34px; font-weight: 100; letter-spacing: -0.05em; }

        .section-card {
            background: var(--bg-color);
            border-radius: 28px;
            padding: 22px;
            margin-bottom: 25px;
            box-shadow: 10px 10px 20px var(--shadow-block-dark), -10px -10px 20px var(--shadow-block-light);
        }

        .section-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-sec);
            margin-bottom: 20px;
            display: flex;
            align-items: center; gap: 8px;
        }

        .field { margin-bottom: 20px; }
        .label { font-size: 11px; font-weight: 600; color: var(--text-sec); margin-bottom: 8px; display: block; padding-left: 5px; }

        .input-h {
            width: 100%;
            padding: 14px 18px;
            font-size: 15px;
            background: var(--bg-color);
            border: none;
            border-radius: 16px;
            color: var(--text-main);
            box-shadow: inset 4px 4px 8px var(--shadow-hollow-dark), inset -4px -4px 8px var(--shadow-hollow-light);
            outline: none;
            font-family: 'Inter';
        }

        .pill-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; }
        .pill {
            padding: 10px 14px;
            font-size: 11px;
            font-weight: 500;
            background: var(--bg-color);
            border-radius: 12px;
            box-shadow: 4px 4px 8px var(--shadow-block-dark), -4px -4px 8px var(--shadow-block-light);
            cursor: pointer;
            color: var(--text-sec);
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .pill.active {
            box-shadow: inset 3px 3px 6px var(--shadow-hollow-dark), inset -3px -3px 6px var(--shadow-hollow-light);
            color: var(--text-main);
            font-weight: 700;
        }

        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

        .btn-primary {
            width: 100%;
            padding: 20px;
            background: var(--bg-color);
            border: none;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            box-shadow: 12px 12px 24px var(--shadow-block-dark), -12px -12px 24px var(--shadow-block-light);
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-primary:active {
            box-shadow: inset 6px 6px 12px var(--shadow-block-dark), inset -6px -6px 12px var(--shadow-block-light);
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Infrastructure</h1>
        </header>

        <form id="infraForm">
            <div class="section-card">
                <h2 class="section-title"><i data-lucide="map-pin"></i> Location & Space</h2>
                <div class="field">
                    <label class="label">CULTIVATION PLACE</label>
                    <div class="pill-group" data-id="lugar_cultivo">
                        <div class="pill active" data-val="indoor room">indoor room</div>
                        <div class="pill" data-val="greenhouse">greenhouse</div>
                        <div class="pill" data-val="open field">open field</div>
                        <div class="pill" data-val="covered field">covered field</div>
                    </div>
                </div>
                
                <div class="grid-3">
                    <div class="field">
                        <label class="label">WIDTH (m)</label>
                        <input type="number" step="0.01" id="ancho" class="input-h" placeholder="0.00">
                    </div>
                    <div class="field">
                        <label class="label">LENGTH (m)</label>
                        <input type="number" step="0.01" id="largo" class="input-h" placeholder="0.00">
                    </div>
                    <div class="field">
                        <label class="label">HEIGHT (m)</label>
                        <input type="number" step="0.01" id="alto" class="input-h" placeholder="0.00">
                    </div>
                </div>
            </div>

            <div class="section-card">
                <h2 class="section-title"><i data-lucide="cpu"></i> Systems</h2>
                <div class="field">
                    <label class="label">SUBSTRATE</label>
                    <input type="text" id="sustrato" class="input-h" placeholder="Type of soil or mix">
                </div>
                <div class="field">
                    <label class="label">LIGHTING</label>
                    <input type="text" id="iluminacion" class="input-h" placeholder="LED, HPS, Sun, etc.">
                </div>
                <div class="field">
                    <label class="label">HUMIDITY CONTROL</label>
                    <input type="text" id="control_humedad" class="input-h" placeholder="Dehumidifier, Mist, etc.">
                </div>
                <div class="field">
                    <label class="label">TEMPERATURE CONTROL</label>
                    <input type="text" id="control_temperatura" class="input-h" placeholder="AC, Heater, etc.">
                </div>
            </div>

            <div class="section-card">
                <h2 class="section-title"><i data-lucide="wind"></i> Airflow</h2>
                <div class="field">
                    <label class="label">AIR MOVEMENT</label>
                    <input type="text" id="movimiento_aire" class="input-h" placeholder="Fans, Oscillation">
                </div>
                <div class="field">
                    <label class="label">INFLOW / OUTFLOW</label>
                    <input type="text" id="iny_ext_aire" class="input-h" placeholder="Intake & Exhaust details">
                </div>
            </div>

            <div class="section-card">
                <h2 class="section-title"><i data-lucide="file-text"></i> Additional Info</h2>
                <div class="field">
                    <label class="label">INFRASTRUCTURE OBSERVATIONS</label>
                    <textarea id="observaciones_infraestructura" class="input-h" style="height: 100px; padding-top:15px;" placeholder="Any extra details..."></textarea>
                </div>
            </div>

            <button type="button" class="btn-primary" onclick="handleSave()">Save Infrastructure</button>
        </form>
    </div>

    <script>
        lucide.createIcons();

        // Pill logic
        document.querySelectorAll('.pill-group .pill').forEach(pill => {
            pill.addEventListener('click', () => {
                const group = pill.closest('.pill-group');
                group.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
                pill.classList.add('active');
            });
        });

        function handleSave() {
            const getActivePill = (id) => {
                const active = document.querySelector(`.pill-group[data-id="${id}"] .pill.active`);
                return active ? active.dataset.val : null;
            };

            const formData = {
                lugar_cultivo: getActivePill('lugar_cultivo'),
                ancho: document.getElementById('ancho').value,
                largo: document.getElementById('largo').value,
                alto: document.getElementById('alto').value,
                sustrato: document.getElementById('sustrato').value,
                iluminacion: document.getElementById('iluminacion').value,
                control_humedad: document.getElementById('control_humedad').value,
                control_temperatura: document.getElementById('control_temperatura').value,
                movimiento_aire: document.getElementById('movimiento_aire').value,
                iny_ext_aire: document.getElementById('iny_ext_aire').value,
                observaciones_infraestructura: document.getElementById('observaciones_infraestructura').value
            };

            // Notificación al orquestador app.js
            if (typeof handleStepSave === 'function') {
                handleStepSave(formData);
            } else {
                console.log("Local Test Data (Infra):", formData);
            }
        }
    </script>
</body>
</html>
