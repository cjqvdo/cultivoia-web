<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cultivo IA - Supplies</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-color: #F0F2F5;
            --text-main: #1B2B41;
            --text-sec: #6B7280;
            --shadow-hollow-dark: rgba(163, 177, 198, 0.6);
            --shadow-hollow-light: rgba(255, 255, 255, 0.9);
            --shadow-block-dark: rgba(163, 177, 198, 0.3);
            --shadow-block-light: rgba(255, 255, 255, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        body {
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 10px 0 120px 0;
        }

        .container { width: 100%; max-width: 420px; }
        header { margin-bottom: 30px; text-align: center; }
        h1 { font-size: 34px; font-weight: 100; letter-spacing: -0.05em; }

        .section-card {
            background: var(--bg-color);
            border-radius: 28px;
            padding: 22px;
            margin-bottom: 25px;
            box-shadow: 10px 10px 20px var(--shadow-block-dark), -10px -10px 20px var(--shadow-block-light);
        }

        .section-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-sec);
            margin-bottom: 20px;
            display: flex;
            align-items: center; gap: 8px;
        }

        .field { margin-bottom: 20px; }
        .label { font-size: 11px; font-weight: 600; color: var(--text-sec); margin-bottom: 8px; display: block; padding-left: 5px; }

        .input-h {
            width: 100%;
            padding: 14px 18px;
            font-size: 15px;
            background: var(--bg-color);
            border: none;
            border-radius: 16px;
            color: var(--text-main);
            box-shadow: inset 4px 4px 8px var(--shadow-hollow-dark), inset -4px -4px 8px var(--shadow-hollow-light);
            outline: none;
            font-family: 'Inter';
        }

        .pill-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; }
        .pill {
            padding: 10px 14px;
            font-size: 11px;
            font-weight: 500;
            background: var(--bg-color);
            border-radius: 12px;
            box-shadow: 4px 4px 8px var(--shadow-block-dark), -4px -4px 8px var(--shadow-block-light);
            cursor: pointer;
            color: var(--text-sec);
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .pill.active {
            box-shadow: inset 3px 3px 6px var(--shadow-hollow-dark), inset -3px -3px 6px var(--shadow-hollow-light);
            color: var(--text-main);
            font-weight: 700;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .btn-primary {
            width: 100%;
            padding: 20px;
            background: var(--bg-color);
            border: none;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            box-shadow: 12px 12px 24px var(--shadow-block-dark), -12px -12px 24px var(--shadow-block-light);
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-primary:active {
            box-shadow: inset 6px 6px 12px var(--shadow-block-dark), inset -6px -6px 12px var(--shadow-block-light);
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Supplies</h1>
        </header>

        <form id="insumosForm">
            <div class="section-card">
                <h2 class="section-title"><i data-lucide="tag"></i> Basic Info</h2>
                <div class="field">
                    <label class="label">ITEM NAME</label>
                    <input type="text" id="nombre" class="input-h" placeholder="Product name">
                </div>
                <div class="field">
                    <label class="label">BRAND</label>
                    <input type="text" id="marca" class="input-h" placeholder="Manufacturer">
                </div>
            </div>

            <div class="section-card">
                <h2 class="section-title"><i data-lucide="layers"></i> Classification</h2>
                <div class="field">
                    <label class="label">CATEGORY</label>
                    <div class="pill-group" data-id="categorías">
                        <div class="pill active" data-val="microorganismo">microorganismo</div>
                        <div class="pill" data-val="fertilizante">fertilizante</div>
                        <div class="pill" data-val="corrector">corrector</div>
                        <div class="pill" data-val="fitoprotector">fitoprotector</div>
                        <div class="pill" data-val="refuerzo">refuerzo</div>
                        <div class="pill" data-val="agua y soluciones">agua y soluciones</div>
                    </div>
                </div>
                <div class="field">
                    <label class="label">BASE TYPE</label>
                    <div class="pill-group" data-id="tipo_base">
                        <div class="pill active" data-val="biologico">biologico</div>
                        <div class="pill" data-val="organico">organico</div>
                        <div class="pill" data-val="mineral">mineral</div>
                        <div class="pill" data-val="acido">acido</div>
                        <div class="pill" data-val="quimico">quimico</div>
                    </div>
                </div>
                <div class="field">
                    <label class="label">FORMAT</label>
                    <div class="pill-group" data-id="formato">
                        <div class="pill active" data-val="liquido">liquido</div>
                        <div class="pill" data-val="solido">solido</div>
                        <div class="pill" data-val="gel">gel</div>
                    </div>
                </div>
            </div>

            <div class="section-card">
                <h2 class="section-title"><i data-lucide="zap"></i> Usage & Specs</h2>
                <div class="field">
                    <label class="label">MAIN USE</label>
                    <input type="text" id="uso_principal" class="input-h" placeholder="e.g., Bloom, Rooting">
                </div>
                <div class="field">
                    <label class="label">APPLICATION</label>
                    <div class="pill-group" data-id="aplicación">
                        <div class="pill active" data-val="radicular riego">radicular riego</div>
                        <div class="pill" data-val="sustrato">sustrato</div>
                        <div class="pill" data-val="foliar">foliar</div>
                    </div>
                </div>
                <div class="field">
                    <label class="label">INCOMPATIBILITY</label>
                    <input type="text" id="incompatibilidad" class="input-h" placeholder="e.g., Calcium">
                </div>
            </div>

            <div class="section-card">
                <h2 class="section-title"><i data-lucide="box"></i> Inventory</h2>
                <div class="field">
                    <label class="label">EXISTENCE</label>
                    <input type="number" step="0.01" id="existencias" class="input-h" placeholder="0.00">
                </div>
                <div class="field">
                    <label class="label">UNIT OF MEASURE</label>
                    <div class="pill-group" data-id="unidad_medida">
                        <div class="pill active" data-val="ml">ml</div>
                        <div class="pill" data-val="gr">gr</div>
                        <div class="pill" data-val="oz">oz</div>
                        <div class="pill" data-val="gal">gal</div>
                    </div>
                </div>
            </div>

            <button type="button" class="btn-primary" onclick="handleSave()">Save Supply</button>
        </form>
    </div>

    <script>
        lucide.createIcons();

        // Pill Selection Logic
        document.querySelectorAll('.pill-group .pill').forEach(pill => {
            pill.addEventListener('click', () => {
                const group = pill.closest('.pill-group');
                group.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
                pill.classList.add('active');
            });
        });

        function handleSave() {
            const getActivePill = (groupId) => {
                const active = document.querySelector(`.pill-group[data-id="${groupId}"] .pill.active`);
                return active ? active.getAttribute('data-val') : null;
            };

            const payload = {
                nombre: document.getElementById('nombre').value,
                marca: document.getElementById('marca').value,
                categorías: getActivePill('categorías'),
                tipo_base: getActivePill('tipo_base'),
                formato: getActivePill('formato'),
                uso_principal: document.getElementById('uso_principal').value,
                aplicación: getActivePill('aplicación'),
                incompatibilidad: document.getElementById('incompatibilidad').value,
                existencias: parseFloat(document.getElementById('existencias').value) || 0,
                unidad_de_medida: getActivePill('unidad_medida')
            };
            
            // Notification to central orchestrator
            if (typeof handleStepSave === 'function') {
                handleStepSave(payload);
            } else {
                console.log("Local Test Data (Supplies):", payload);
            }
        }
    </script>
</body>
</html>
